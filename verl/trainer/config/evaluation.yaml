data:
  path: /tmp/math_Qwen2-7B-Instruct.parquet
  prompt_key: prompt
  response_key: responses
  # If set and `responses` is a list, only score the designated response.
  # HERO paper eval uses index 0 to report pass@1 on the first decoded output.
  primary_response_index: null
  data_source_key: data_source
  reward_model_key: reward_model
  # Algorithm 1 columns for one-step EIF evaluation.
  # Each row must contain one scalar tau_LLM(x, y, r_i) and one scalar m_LLM(x, y).
  tau_key: tau_llm_value
  m_key: m_llm_value

custom_reward_function:
  path: null
  name: compute_score

ray_kwargs:
  ray_init:
    num_cpus: null # `None` means using all CPUs, which might cause hang if limited in systems like SLURM. Please set to a number allowed then.
  timeline_json_file: null

one_step_eif:
  enable: false
  # If `responses` is a list, use this response as the primary y_i for phi_i and EIF aggregation.
  primary_response_index: 0
