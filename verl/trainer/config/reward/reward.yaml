# configs for the reward computation

# we launch num_workers reward managers to parallelize the reward computation
num_workers: 8

# custom reward function definition
custom_reward_function:
  # The path to the file containing your customized reward function.
  # If not specified, pre-implemented reward functions will be used.
  path: null
  # The name of the reward function within the specified file. Default is 'compute_score'.
  name: compute_score

# reward manager, see `verl/trainer/config/reward_manager.yaml` for details.
reward_manager:
  _target_: verl.workers.config.reward_model.RewardManagerConfig
  source: register
  name: naive
  module:
    _target_: verl.trainer.config.config.ModuleConfig
    path: null
    name: custom_reward_manager

# Inference config for reward models,
# support both discriminative and generative models
reward_model:
  enable: False

  # Whether to deploy the model to a separate resource pool.
  # If true, n_gpus_per_node & nnodes will be used to determine the resource node.
  enable_resource_pool: False
  n_gpus_per_node: 8
  nnodes: 0

  model_path: null
  rollout:
    _target_: verl.workers.config.RolloutConfig
    name: ???
    dtype: bfloat16
    gpu_memory_utilization: 0.5
    enforce_eager: true
    cudagraph_capture_sizes: null
    free_cache_engine: true
    data_parallel_size: 1
    expert_parallel_size: 1
    tensor_model_parallel_size: 2
    max_num_batched_tokens: 8192
    max_model_len: null
    max_num_seqs: 1024
    load_format: auto
    engine_kwargs: {}
    limit_images: null
    enable_chunked_prefill: true
    enable_prefix_caching: true
    disable_log_stats: true
    skip_tokenizer_init: false

    prompt_length: 2048
    response_length: 2048

# Cloud/local sandbox fusion configuration for custom reward logic
sandbox_fusion:
  # Cloud /local function URL for sandbox execution
  url: null
  # Max concurrent requests allowed to sandbox
  max_concurrent: 64
  # Max memory limit for each sandbox process in MB
  memory_limit_mb: 1024

# Optional algorithm-specific reward settings.
# Examples:
# - reward.reward_manager.name=hero
# - reward.reward_manager.name=hybrid_eif with precomputed aux tau samples (evaluation only)
# - reward.reward_manager.name=hybrid_eif_online for online generative aux/tau reward (training)
reward_kwargs:
  hero:
    alpha: 0.1
    beta: 0.1
    eps: 1e-6
    w_min: 0.4
    w_max: 3.0
    k: 6.0
    sigma_ema: 0.9
  hybrid_eif:
    # Read precomputed tau samples from DataProto.batch or DataProto.non_tensor_batch.
    # NOTE: This mode is only valid for evaluation (fixed y_i). For training, use hybrid_eif_online.
    aux_tau_key: aux_tau_values
  hybrid_eif_online:
    # Number of auxiliary samples per response (M+1), including the control sample.
    num_aux_samples: 4
    # If online scoring fails for a sample, fall back to phi instead of aborting training.
    fail_open_to_phi: true
    # Max concurrent requests for auxiliary reward scoring.
    aux_concurrency: 32
    # Max concurrent requests for tau_LLM calls.
    tau_concurrency: 128
    # Auxiliary reward model (r_ij generator): Qwen/Qwen2.5-7B-Instruct via OpenAI-compatible API.
    aux_model: Qwen/Qwen2.5-7B-Instruct
    aux_base_url: http://localhost:8000/v1
    aux_api_key_env: OPENAI_API_KEY
    aux_temperature: 1.0
    aux_max_tokens: 16
    aux_timeout: 300.0
    # Tau LLM (tau_LLM): defaults to the same 7B model/endpoint as aux for easy vanilla checks.
    # For full-scale experiments, override to Qwen/Qwen2.5-32B-Instruct on a separate endpoint.
    tau_model: Qwen/Qwen2.5-7B-Instruct
    tau_base_url: http://localhost:8000/v1
    tau_api_key_env: OPENAI_API_KEY
    tau_temperature: 0.0
    tau_max_tokens: 16
    tau_timeout: 300.0
